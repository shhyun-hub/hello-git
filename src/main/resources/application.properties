spring.application.name=guest-book

#Server
server.port=8080
server.servlet.session.timeout=60m

#Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

spring.thymeleaf.check-template=true
spring.thymeleaf.check-template-location=true
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

#Database config
spring.datasource.url=jdbc:mysql://server-02:3306/gbook_db?allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowMultiQueries=true
spring.datasource.username=shhyun
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#mybatis config
mybatis.config-location=classpath:mybatis-config.xml

#mybatis mapper
mybatis.mapper-locations=classpath:mapper/board.xml

#매퍼 파일에서 alias를 쓰기위한 패키지 지정
mybatis.type-aliases-package=com.shh.board.model

# --- JPA / Hibernate Config ---
# 테이블이 없으면 자동으로 생성해주는 핵심 설정
spring.jpa.hibernate.ddl-auto=update

# 어떤 데이터베이스 문법(Dialect)을 쓸지 지정 (MySQL 8.x 이상 버전용)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 실행되는 SQL을 터미널 로그에 예쁘게 출력

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.show_sql=true
# (선택) Open EntityManager in View 경고 방지
spring.jpa.open-in-view=true